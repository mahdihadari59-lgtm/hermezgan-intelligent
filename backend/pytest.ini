"""pytest configuration and test runner"""

[pytest]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
addopts = "-v --tb=short --strict-markers"
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
log_cli = true
log_cli_level = INFO
